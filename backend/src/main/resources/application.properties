# ============================
# HisabKitab Application Config
# ============================

# Server Port
server.port=8080

# ============================
# MySQL Database Configuration
# ============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hisabkitab?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate Configuration
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================
# Application Name
# ============================
spring.application.name=HisabKitab

# ============================
# JWT Configuration
# ============================
# Secret key for signing JWT tokens (Base64 encoded)
# In production, this should be in environment variables, NOT in code!
jwt.secret=${JWT_SECRET:dGhpc0lzQVZlcnlMb25nU2VjcmV0S2V5Rm9ySGlzYWJLaXRhYkpXVFRva2VuMTIzNDU2Nzg5MA==}
# Token validity: 24 hours (in milliseconds)
jwt.expiration=${JWT_EXPIRATION:86400000}
